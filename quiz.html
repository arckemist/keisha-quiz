<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="quiz-title">Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LANDING SCREEN -->
  <div id="landing" style="display:none">
    <h1 id="quiz-title-display">Loading...</h1>
    <p id="landing-sub">55 Questions · 100 Points · Pass: 85%</p>
    <p id="quiz-error" style="display:none;color:#dc2626;font-weight:600;max-width:400px;text-align:center"></p>
    <button id="start-btn" onclick="startQuiz()">Start Quiz</button>
  </div>

  <!-- QUIZ AREA -->
  <div id="quiz-area" style="display:none">
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    <p id="progress-text"></p>
    <img id="question-image" style="display:none; max-width:320px; margin:auto">
    <p id="question-text"></p>
    <div id="answer-area"></div>
  </div>

  <!-- REVIEW AREA -->
  <div id="review-area" style="display:none">
    <h2 id="final-score"></h2>
    <div id="review-list"></div>
  </div>

  <!-- CONFETTI LAYER (managed by launchConfetti()) -->
  <div id="confetti-container"></div>

  <script src="script.js"></script>
</body>
</html>
